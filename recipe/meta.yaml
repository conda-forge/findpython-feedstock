{% set name = "findpython" %}
{% set version = "0.8.0" %}

package:
  name: {{ name|lower }}
  version: {{ version }}

source:
  url: https://pypi.org/packages/source/{{ name[0] }}/{{ name }}/findpython-{{ version }}.tar.gz
  sha256: 53b32264874dfa5990bd09d717819386d8db3149d89fe20f88fe1078de286bae

build:
  noarch: python
  script: {{ PYTHON }} -m pip install . -vv
  number: 0
  entry_points:
    - findpython = "findpython.__main__:main"

requirements:
  host:
    - pip
    - python {{ python_min }}
    - pdm-backend
  run:
    - packaging >=20
    - python >={{ python_min }}
    - platformdirs >=4.3.6

test:
  imports:
    - findpython
  commands:
    - pip check
  requires:
    - pip
    - python {{ python_min }}

about:
  home: https://pypi.org/project/findpython/
  dev_url: https://github.com/frostming/findpython
  summary: A utility to find python versions on your system
  license: MIT
  license_file: LICENSE

extra:
  recipe-maintainers:
    - xhochy
